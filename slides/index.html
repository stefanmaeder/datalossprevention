<!doctype html>
<html>
<head>
  <meta charset="utf-8">

  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.css">

  <script src="https://cdn.jsdelivr.net/npm/reveal.js/dist/reveal.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/reveal.js/plugin/markdown/markdown.js"></script>
    <style>
    @font-face {
  font-family: Inter;
  font-style: normal;
  font-weight: 200 700;
  font-display: swap;
  src: url("Inter.ttf") format("ttf");
}
.reveal {
  font-family: 'Inter', sans-serif;
  letter-spacing: -0.5pt;
}
.reveal .slides section.present {
  max-width: 800px;
  left: 50% !important;
  transform: translateX(-50%);
}
.reveal p,
.reveal li {
  line-height: 1.6;
}
      .reveal ul,
.reveal ol {
  text-align: left;
}
  </style>
</head>

<body>

<div class="reveal">
  <div class="slides">

<section
  data-markdown="slides.md"
  data-separator="^---$"
  data-separator-vertical="^--$">
</section>

  </div>
</div>

<script>
Reveal.initialize({
  hash: true,
  plugins: [ RevealMarkdown ]
});
</script>

</body>
</html>
